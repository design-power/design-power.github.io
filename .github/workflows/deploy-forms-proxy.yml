name: Deploy Yandex Forms Proxy

on:
  push:
    branches: [main]
    paths:
      - proxy-worker/**
      - .github/workflows/deploy-forms-proxy.yml
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: proxy-worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: proxy-worker/package.json
      - run: npm install
      - name: Sync OAuth secret (optional)
        if: ${{ secrets.YANDEX_FORMS_OAUTH_TOKEN != '' }}
        run: echo "${{ secrets.YANDEX_FORMS_OAUTH_TOKEN }}" | npx wrangler secret put YANDEX_FORMS_OAUTH_TOKEN
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - run: npm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
