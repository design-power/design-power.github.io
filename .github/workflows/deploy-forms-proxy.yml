name: Deploy Yandex Forms Proxy

on:
  push:
    branches: [main]
    paths:
      - proxy-worker/**
      - .github/workflows/deploy-forms-proxy.yml
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: proxy-worker
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      YANDEX_FORMS_OAUTH_TOKEN: ${{ secrets.YANDEX_FORMS_OAUTH_TOKEN }}
      YANDEX_FORMS_ORG_ID: ${{ secrets.YANDEX_FORMS_ORG_ID }}
      YANDEX_FORMS_CLOUD_ORG_ID: ${{ secrets.YANDEX_FORMS_CLOUD_ORG_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: proxy-worker/package.json
      - run: npm install
      - name: Sync Worker secrets (optional)
        run: |
          if [ -n "$YANDEX_FORMS_OAUTH_TOKEN" ]; then
            echo "$YANDEX_FORMS_OAUTH_TOKEN" | npx wrangler secret put YANDEX_FORMS_OAUTH_TOKEN
          fi

          if [ -n "$YANDEX_FORMS_ORG_ID" ]; then
            echo "$YANDEX_FORMS_ORG_ID" | npx wrangler secret put YANDEX_FORMS_ORG_ID
          fi

          if [ -n "$YANDEX_FORMS_CLOUD_ORG_ID" ]; then
            echo "$YANDEX_FORMS_CLOUD_ORG_ID" | npx wrangler secret put YANDEX_FORMS_CLOUD_ORG_ID
          fi
      - run: npm run deploy
