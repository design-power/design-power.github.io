name = "wedding-yandex-forms-proxy"
main = "src/index.ts"
compatibility_date = "2026-04-13"
workers_dev = true

[vars]
ALLOWED_ORIGINS = "https://design-power.github.io,http://localhost:5173"
SUBMIT_DEDUP_ENABLED = "true"
SUBMIT_DEDUP_FIELD_NAME = "name"
SUBMIT_DEDUP_TTL_SECONDS = "31536000"

# Optional: bind KV to block duplicate submissions server-side.
# Create KV namespace and paste its id below.

[[kv_namespaces]]
binding = "SUBMIT_DEDUP_KV"
id = "28461cf54f8f4b70a2e5fa759bd695df"
